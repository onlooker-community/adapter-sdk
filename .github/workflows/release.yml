name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # Use a PAT instead of GITHUB_TOKEN so the release PR triggers
          # downstream workflows (CI, etc.). Events caused by GITHUB_TOKEN
          # deliberately do not fan out to other workflows; that policy
          # leaves release PRs unchecked. Set RELEASE_PLEASE_PAT to a
          # fine-grained token with Contents:write + Pull requests:write
          # scoped to this repo.
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      # Publishing to npm is now handled by publish-npm.yml — triggered
      # by the `v*.*.*` tag release-please creates when a release PR
      # merges. Keeping the two concerns separate gives the publish
      # path a multi-Node test matrix, npm provenance, and a
      # workflow_dispatch fallback for emergency publishes.
