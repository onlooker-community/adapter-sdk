name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

      # Publishing to npm is now handled by publish-npm.yml — triggered
      # by the `v*.*.*` tag release-please creates when a release PR
      # merges. Keeping the two concerns separate gives the publish
      # path a multi-Node test matrix, npm provenance, and a
      # workflow_dispatch fallback for emergency publishes.
